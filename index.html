<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Grazie a te</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px;
    }

    /* ── SCHERMATA INIZIALE ── */
    #loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      color: #ffffff;
      text-align: center;
    }

    .spinner {
      width: 56px;
      height: 56px;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #loading-screen p {
      font-size: 1rem;
      color: #888;
    }

    /* ── FRAME RISULTATO ── */
    #result-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0;
      width: 100%;
      max-width: 380px;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Cornice polaroid */
    .polaroid {
      background: #ffffff;
      padding: 16px 16px 0 16px;
      border-radius: 4px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.7), 0 2px 8px rgba(0,0,0,0.4);
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .polaroid img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 2px;
      display: block;
    }

    /* Testo dentro la polaroid */
    .polaroid-caption {
      padding: 20px 8px 24px 8px;
      text-align: center;
      width: 100%;
    }

    .polaroid-caption .label {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #bbbbbb;
      margin-bottom: 8px;
    }

    .polaroid-caption .message {
      font-family: "Georgia", "Times New Roman", serif;
      font-size: 1.45rem;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.3;
    }

    .polaroid-caption .heart {
      font-size: 1.6rem;
      margin-top: 10px;
      display: block;
      animation: heartbeat 1.4s ease-in-out infinite;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      30%       { transform: scale(1.2); }
      60%       { transform: scale(1.05); }
    }

    /* Bottoni sotto la polaroid */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 28px;
      width: 100%;
    }

    .btn {
      padding: 14px;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
    }

    .btn:active { transform: scale(0.96); opacity: 0.85; }

    .btn-primary   { background: #ffffff; color: #0f0f0f; }
    .btn-secondary {
      background: transparent;
      color: #888;
      border: 1px solid #333;
    }

    /* Input nascosto */
    #cameraInput { display: none; }
  </style>
</head>
<body>

  <input type="file" id="cameraInput" accept="image/*" capture="user" />

  <!-- Schermata di attesa mentre si apre la fotocamera -->
  <div id="loading-screen">
    <div class="spinner"></div>
    <p>Apertura fotocamera…</p>
  </div>

  <!-- Schermata risultato con la polaroid -->
  <div id="result-screen">
    <div class="polaroid">
      <img id="preview" alt="La tua foto" />
      <div class="polaroid-caption">
        <div class="label">Un messaggio per te</div>
        <div class="message">La persona che ringrazio sei tu</div>
        <span class="heart">♥</span>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary"    onclick="downloadPhoto()">⬇️ Salva la foto</button>
      <button class="btn btn-secondary"  onclick="retake()">📷 Rifai la foto</button>
    </div>
  </div>

  <script>
    const input = document.getElementById("cameraInput");

    // Auto-apertura fotocamera al caricamento
    window.addEventListener("load", () => setTimeout(openCamera, 300));

    function openCamera() {
      input.value = "";
      input.click();
    }

    // Quando l'utente scatta (o annulla)
    input.addEventListener("change", function () {
      const file = this.files[0];
      if (!file) return; // ha annullato

      const url = URL.createObjectURL(file);
      document.getElementById("preview").src = url;

      // Transizione: nascondi loader, mostra polaroid
      document.getElementById("loading-screen").style.display = "none";
      const rs = document.getElementById("result-screen");
      rs.style.display = "flex";

      input._currentFile = file;
    });

    function downloadPhoto() {
      const file = input._currentFile;
      if (!file) return;
      const a = document.createElement("a");
      a.href = URL.createObjectURL(file);
      a.download = `grazie_a_te_${Date.now()}.jpg`;
      a.click();
    }

    function retake() {
      document.getElementById("result-screen").style.display = "none";
      document.getElementById("loading-screen").style.display = "flex";
      setTimeout(openCamera, 150);
    }
  </script>

</body>
</html>
