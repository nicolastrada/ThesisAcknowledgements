<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Fotocamera</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0a0a0a;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px;
      gap: 24px;
    }

    .icon {
      font-size: 72px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%       { transform: scale(1.08); opacity: 0.75; }
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
    }

    p {
      font-size: 0.95rem;
      color: #aaaaaa;
      text-align: center;
      max-width: 280px;
      line-height: 1.5;
    }

    /* Input file nascosto — è lui che apre la fotocamera nativa */
    #cameraInput {
      display: none;
    }

    .btn {
      margin-top: 8px;
      padding: 16px 36px;
      font-size: 1rem;
      font-weight: 600;
      background: #ffffff;
      color: #0a0a0a;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.15s, background 0.15s;
      width: 100%;
      max-width: 280px;
    }

    .btn:active {
      transform: scale(0.96);
      background: #dddddd;
    }

    .btn-secondary {
      background: transparent;
      color: #aaaaaa;
      border: 1px solid #333333;
      margin-top: 0;
    }

    /* Preview foto scattata */
    #preview-container {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
      max-width: 400px;
    }

    #preview {
      width: 100%;
      border-radius: 16px;
      object-fit: cover;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }

    #status {
      font-size: 0.85rem;
      color: #666666;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Input nascosto: capture="environment" = fotocamera posteriore -->
  <!-- Cambia in capture="user" per la fotocamera frontale       -->
  <input
    type="file"
    id="cameraInput"
    accept="image/*"
    capture="environment"
  />

  <!-- Schermata iniziale -->
  <div id="main-screen" style="display:flex; flex-direction:column; align-items:center; gap:24px;">
    <div class="icon">📷</div>
    <h1>Apri la fotocamera</h1>
    <p>Tocca il pulsante per scattare una foto con la fotocamera del tuo dispositivo.</p>
    <button class="btn" onclick="openCamera()">Scatta una foto</button>
    <button class="btn btn-secondary" onclick="switchCamera()">🔄 Cambia fotocamera</button>
    <span id="status">Fotocamera attiva: <strong id="cam-label">Posteriore</strong></span>
  </div>

  <!-- Schermata preview dopo lo scatto -->
  <div id="preview-container">
    <h1>Foto scattata ✅</h1>
    <img id="preview" alt="Foto scattata" />
    <button class="btn" onclick="downloadPhoto()">⬇️ Scarica foto</button>
    <button class="btn btn-secondary" onclick="resetCamera()">📷 Scatta un'altra</button>
  </div>

  <script>
    const input = document.getElementById("cameraInput");
    let isFront = false; // false = posteriore (environment), true = frontale (user)

    // Auto-trigger al caricamento della pagina
    window.addEventListener("load", () => {
      // Piccolo delay per garantire che il browser sia pronto
      setTimeout(openCamera, 300);
    });

    function openCamera() {
      input.click();
    }

    function switchCamera() {
      isFront = !isFront;
      input.setAttribute("capture", isFront ? "user" : "environment");
      document.getElementById("cam-label").textContent = isFront ? "Frontale" : "Posteriore";
    }

    // Quando l'utente scatta la foto
    input.addEventListener("change", function () {
      const file = this.files[0];
      if (!file) return;

      const url = URL.createObjectURL(file);
      document.getElementById("preview").src = url;

      // Mostra la preview, nascondi la schermata principale
      document.getElementById("main-screen").style.display = "none";
      const pc = document.getElementById("preview-container");
      pc.style.display = "flex";

      // Salva il file per il download
      input._currentFile = file;
    });

    function downloadPhoto() {
      const file = input._currentFile;
      if (!file) return;
      const a = document.createElement("a");
      a.href = URL.createObjectURL(file);
      a.download = `foto_${Date.now()}.jpg`;
      a.click();
    }

    function resetCamera() {
      // Reset input per permettere un nuovo scatto
      input.value = "";
      document.getElementById("preview-container").style.display = "none";
      document.getElementById("main-screen").style.display = "flex";
      setTimeout(openCamera, 150);
    }
  </script>

</body>
</html>
