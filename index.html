<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Ringraziamenti</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 32px 24px;
      -webkit-tap-highlight-color: transparent;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── SCHERMATA INIZIALE ── */
    #home-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      text-align: center;
      color: #fff;
      animation: fadeIn 0.6s ease;
      width: 100%;
      max-width: 360px;
    }

    .trophy {
      font-size: 80px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-14px); }
    }

    #home-screen h1 {
      font-size: 1.7rem;
      font-weight: 800;
      line-height: 1.3;
    }

    #home-screen p {
      font-size: 1rem;
      color: #777;
      line-height: 1.7;
      max-width: 280px;
    }

    .btn-main {
      width: 100%;
      margin-top: 20px;
      padding: 20px 24px;
      font-size: 1rem;
      font-weight: 700;
      color: #0f0f0f;
      background: #ffffff;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      line-height: 1.4;
      box-shadow: 0 4px 24px rgba(255,255,255,0.15);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn-main:active {
      transform: scale(0.96);
      box-shadow: 0 2px 10px rgba(255,255,255,0.08);
    }

    /* ── SCHERMATA FOTOCAMERA ── */
    #camera-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      width: 100%;
      max-width: 380px;
      animation: fadeIn 0.4s ease;
    }

    #camera-screen video {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 4px;
      background: #1a1a1a;
      transform: scaleX(-1); /* specchio, come ci si aspetta dalla frontale */
    }

    #btn-capture {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #fff;
      border: 4px solid #555;
      cursor: pointer;
      transition: transform 0.15s;
      box-shadow: 0 4px 20px rgba(255,255,255,0.2);
    }

    #btn-capture:active { transform: scale(0.9); }

    /* ── SCHERMATA RISULTATO ── */
    #result-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 380px;
      animation: fadeIn 0.6s ease;
    }

    .polaroid {
      background: #ffffff;
      padding: 16px 16px 0 16px;
      border-radius: 4px;
      width: 100%;
      box-shadow: 0 12px 48px rgba(0,0,0,0.7), 0 2px 8px rgba(0,0,0,0.4);
    }

    .polaroid img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 2px;
      display: block;
    }

    .polaroid-caption {
      padding: 20px 8px 26px 8px;
      text-align: center;
    }

    .polaroid-caption .label {
      margin-top: 10px;
      font-size: 0.70rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #bbbbbb;
      margin-bottom: 10px;
    }

    .polaroid-caption .message {
      font-family: "Georgia", "Times New Roman", serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.35;
    }

    .polaroid-caption .heart {
      font-size: 1.6rem;
      margin-top: 12px;
      display: block;
      animation: heartbeat 1.4s ease-in-out infinite;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      30%       { transform: scale(1.22); }
      60%       { transform: scale(1.06); }
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 28px;
      width: 100%;
    }

    .btn {
      padding: 15px;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
    }

    .btn:active { transform: scale(0.96); opacity: 0.85; }
    .btn-primary   { background: #ffffff; color: #0f0f0f; }
    .btn-secondary {
      background: transparent;
      color: #888;
      border: 1px solid #333;
    }

    canvas { display: none; }
  </style>
</head>
<body>

  <!-- Landing page -->
  <div id="home-screen">
    <div class="trophy">🍾</div>
    <h1>I Veri Ringraziamenti</h1>
    <p>Se sei arrivato fin qui vuol dire che ci tieni proprio a leggere dei veri ringraziamenti...</p>
    <button class="btn-main" onclick="openCamera()">
      Clicca e guarda chi veramente ne fa parte
    </button>
  </div>

  <!-- Anteprima fotocamera -->
  <div id="camera-screen">
    <video id="video" autoplay playsinline muted></video>
    <button id="btn-capture" onclick="capturePhoto()" title="Scatta"></button>
  </div>

  <!-- Schermata polaroid -->
  <div id="result-screen">
    <div class="polaroid">
      <img id="preview" alt="La tua foto" />
      <div class="polaroid-caption">
        <div class="message">La persona che ringrazio sei tu</div>
        <span class="heart">♥</span>
        <br>
        <div class="label">(No davvero grazie mille...)</div>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" onclick="retake()">🔄 Rifai la foto</button>
    </div>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    const video   = document.getElementById("video");
    const canvas  = document.getElementById("canvas");
    const preview = document.getElementById("preview");
    let stream    = null;

    async function openCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user" }, // ← fotocamera frontale su tutti i dispositivi
          audio: false
        });
        video.srcObject = stream;

        document.getElementById("home-screen").style.display   = "none";
        document.getElementById("camera-screen").style.display = "flex";
      } catch (err) {
        alert("Impossibile accedere alla fotocamera. Controlla i permessi.");
        console.error(err);
      }
    }

    function capturePhoto() {
      // Adatta il canvas al video e scatta
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;

      const ctx = canvas.getContext("2d");

      // Specchio orizzontale (coerente con il preview video)
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0);

      // Ferma lo stream e mostra la polaroid
      stopStream();

      preview.src = canvas.toDataURL("image/jpeg", 0.92);

      document.getElementById("camera-screen").style.display = "none";
      document.getElementById("result-screen").style.display = "flex";
    }

    function stopStream() {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
    }

    function retake() {
      document.getElementById("result-screen").style.display = "none";
      document.getElementById("home-screen").style.display   = "flex";
      setTimeout(openCamera, 150);
    }
  </script>

</body>
</html>
